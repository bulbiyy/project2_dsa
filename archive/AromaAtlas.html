<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AromaAtlas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {box-sizing: border-box; margin: 0; padding: 0;}

        :root {
            --blush: #fdf0f3;
            --petal: #f7d6e0;
            --rose: #e8a0b4;
            --rose-dark: #c5687e;
            --lavender: #ede8f8;
            --lilac: #c4b5e8;
            --lilac-dark: #8b6fc4;
            --plum: #5c3d7a;
            --mist: #f9f4fb;
            --smoke: #a899b8;
            --ink: #2d1f3d;
            --serif: 'Playfair Display', Georgia, serif;
            --sans: 'DM Sans', sans-serif;
            --trans: 0.25s ease;
        }

        html {scroll-behavior: smooth;}

        body{
            font-family: var(--sans);
            background: var(--blush);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* flower background pattern */
        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image:
                radial-gradient(ellipse 70% 50% at 10% 20%, rgba(196,181,232,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(232,160,180,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(253,240,243,0) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
            }

        header {
            position: relative;
            text-align: center;
            padding: 3.5rem 2rem 3rem;
            background: linear-gradient(160deg, #fff5f8 0%, #f0eafb 100%);
            border-bottom: 1px solid var(--petal);
            overflow: hidden;
        }

        /* flower shapes */
        header::before {
            content: "";
            position: absolute;
            top: -40px; left: -40px;
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(196,181,232,0.25) 0%, transparent 70%);
            border-radius: 50%;
        }

        header::after {
            content: "";
            position: absolute;
            bottom: -30px; right: -30px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(232,160,180,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-inner {position: relative; z-index: 1;}

        .header-tag {
            display: inline-block;
            font-family: var(--sans);
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--lilac-dark);
            background: var(--lavender);
            padding: 0.3rem 1rem;
            border-radius: 999px;
            margin-bottom: 1.25rem;
        }

        header h1 {
            font-family: var(--serif);
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 400;
            color: var(--plum);
            letter-spacing: 0.02em;
            line-height: 1;
            margin-bottom: 0.75rem;
        }

        header h1 em {
            font-style: italic;
            color: var(--rose-dark);
        }

        .header-sub {
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--smoke);
            letter-spacing: 0.05em;
        }

        .petals {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem;
        }

        /* search */
        .search-card {
            background: #fff;
            border: 1px solid var(--petal);
            border-radius: 20px;
            padding: 2.25rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 32px rgba(140, 90, 160, 0.07);
            animation: fadeUp 0.5s ease both;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--lilac-dark);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--lavender);
        }

        /* notes */
        .notes-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .note-field {position: relative;}

        .note-field label {
            display: block;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--smoke);
            margin-bottom: 0.7rem;
        }

        .note-field input {
            width: 100%;
            background: var(--mist);
            border: 1.5px solid var(--lavender);
            border-radius: 10px;
            color: var(--ink);
            font-family: var(--sans);
            font-size: 0.95rem;
            padding: 0.6rem 0.9rem;
            outline: none;
            transition: border-color var(--trans), box-shadow var(--trans);
        }

        .note-field input::placeholder {color: #ccc0d8}

        .note-field input:focus {
            border-color: var(--lilac);
            box-shadow: 0 0 0 3px rgba(196,181,232,0.2);
        }

        /* autocomplete */
        .autocomplete-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1.5px solid var(--lavender);
            border-radius: 10px;
            z-index: 50;
            max-height: 180px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(140, 90, 160, 0.1);
        }

        .autocomplete-list li {
            list-style: none;
            padding: 0.5rem 0.9rem;
            font-size: 0.9rem;
            color: var(--ink);
            cursor: pointer;
            transition: background var(--trans)
        }

        .autocomplete-list li:first-child {border-radius: 8px 8px 0 0;}
        .autocomplete-list li:last-child {border-radius: 0 0 8px 8px;}

        .autocomplete-list li:hover,
        .autocomplete-list li:active {
            background: var(--lavender);
            color: var(--plum);
        }

        /* priority */
        .priority-row {margin-bottom: 1.75rem;}

        .priority-options {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .priority-button {
            background: var(--mist);
            border: 1.5px solid var(--lavender);
            border-radius: 999px;
            color: var(--smoke);
            font-family: var(--sans);
            font-size: 0.82rem;
            font-weight: 400;
            padding: 0.35rem 1rem;
            cursor: pointer;
            transition: all var(--trans)
        }

        .priority-button:hover {
            border-color: var(--lilac);
            color: var(--plum);
        }

        .priority-button.selected {
            background: var(--plum);
            border-color: var(--plum);
            color: #fff;
        }

        /* search button */
        .search-button {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--petal) 0%, var(--rose-dark) 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: var(--sans);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity var(--trans), transform var(--trans);
        }

        .search-button:hover {opacity: 0.92; transform: translateY(-1px);}
        .search-button:active {transform: translateY(0);}
        .search-button:disabled {opacity: 0.5; cursor: not-allowed; transform: none;}

        /* performance card */
        .performance-card {
            display: none;
            background: #fff;
            border: 1px solid var(--petal);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeUp 0.4s ease both;
        }

        .performance-card.visible {display: block;}

        .performance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-top: 1rem;
        }

        .performance-item {
            background: var(--mist);
            border-radius: 12px;
            padding: 1rem 1.25rem;
        }

        .performance-item .ds-name {
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--smoke);
            margin-bottom: 0.3rem;
        }

        .performance-item .ds-time {
            font-family: var(--serif);
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--ink);
            line-height: 1;
        }

        .performance-item .ds-time .unit {
            font-family: var(--sans);
            font-size: 0.8rem;
            color: var(--smoke);
            margin-left: 2px;
        }

        .performance-item.fastest {background: var(--lavender);}
        .performance-item.fastest .ds-name {color: var(--plum);}

        .fastest-tag {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--lilac-dark);
            margin-top: 0.25rem;
        }

        .performance-track {
            margin-top: 1.25rem;
            height: 4px;
            background: var(--lavender);
            border-radius: 999px;
            overflow: hidden;
        }

        .performance-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--plum), var(--rose-dark));
            border-radius: 999px;
            transition: width 0.8s ease;
        }

        /* results */
        .results-section {animation: fadeUp 0.5s ease both;}

        .ds-toggle {
            display: flex;
            background: #fff;
            border: 1px solid var(--petal);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
            gap: 4px;
        }

        .ds-toggle-button {
            flex: 1;
            padding: 0.6rem;
            background: transparent;
            border: none;
            border-radius: 9px;
            font-family: var(--sans);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--smoke);
            cursor: pointer;
            transition: all var(--trans);
        }

        .ds-toggle-button.active {
            background: var(--plum);
            color: #fff;
        }

        /* tiers */
        .tier-block {margin-bottom: 2.5rem;}

        .tier-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .tier-tag {
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
        }

        .tier1 .tier-tag {background: #f0faf0; color: #3a7a3a;}
        .tier2 .tier-tag {background: var(--lavender); color: var(--plum);}
        .tier3 .tier-tag {background: var(--petal); color: var(--rose-dark);}

        .tier-label {
            font-family: var(--serif);
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--ink);
        }

        .tier-count {
            font-size: 0.7rem;
            color: var(--smoke);
            margin-left: auto;
        }

        /* perfume cards */
        .perfume-list {display: flex; flex-direction: column; gap: 0;}

        .perfume-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1rem 0.25rem;
            border-bottom: 1px solid #f3eef8;
            gap: 1rem;
            animation: fadeUp 0.3s ease both;
            transition: background var(--trans);
            border-radius: 8px;
        }

        .perfume-card:hover {
            background: #fdf8ff;
            padding: 1rem 0.75rem;
        }

        .card-name {
            font-family: var(--serif);
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--ink);
            margin-bottom: 0.15rem;
        }

        .card-brand {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--smoke);
            margin-bottom: 0.5rem;
        }

        .card-notes {display: flex; flex-wrap: wrap; gap: 0.35rem;}

        .note-pill {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
        }

        .note-pill.top {background: #f0faf0; color: #3a7a3a;}
        .note-pill.middle {background: var(--lavender); color: var(--plum);}
        .note-pill.base {background: var(--petal); color: var(--rose-dark);}
        .note-pill.priority {outline: 2px solid currentColor; outline-offset: 1px;}

        .card-num {
            font-family: var(--serif);
            font-style: italic;
            font-size: 0.9rem;
            color: var(--lilac);
            min-width: 1.5rem;
            text-align: right;
            padding-top: 0.15rem;
        }

        .show-more-button {
            display: block;
            width: 100%;
            margin-top: 1rem;
            padding: 0.65rem;
            background: transparent;
            border: 1.5px solid var(--lavender);
            border-radius: 10px;
            font-family: var(--sans);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--lilac-dark);
            cursor: pointer;
            transition: all var(--trans);
        }

        .show-more-button:hover {
            background: var(--lavender);
            color: var(--plum)
        }

        .empty-tier {
            font-size: 0.9rem;
            color: var(--smoke);
            padding: 1rem 0;
            font-style: italic;
        }

        /* error */
        .error-message {
            display: none;
            background: #fff0f3;
            border: 1px solid #f5c0cc;
            border-radius: 10px;
            padding: 0.9rem 1.25rem;
            font-size: 0.88rem;
            color: var(--rose-dark);
            margin-bottom: 1.5rem;
        }

        .error-message.visible {display: block;}

        /* loading */
        .loading-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(253, 240, 243, 0.75);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.visible {display: flex;}

        .loading-box {
            background: #fff;
            border: 1px solid var(--petal);
            border-radius: 20px;
            padding: 2rem 3rem;
            text-align: center;
            box-shadow: 0 8px 40px rgba(140, 90, 160, 0.12);
        }

        .loading-flower {
            font-size: 2rem;
            animation: spin 2s linear infinite;
            display: block;
            margin-bottom: 0.75rem;
        }

        .loading-label {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--smoke);
        }

        /* animations */
        @keyframes fadeUp {
            from {opacity: 0; transform: translateY(12px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @keyframes spin {
            from {transform: rotate(0deg);}
            to {transform: rotate(360deg);}
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <span class="loading-flower">✿</span>
            <div class="loading-label">Searching the atlas...</div>
        </div>
    </div>

    <header>
        <!-- petals -->
        <svg class="petals" viewBox="0 0 800 260">
            <ellipse cx="90"  cy="60"  rx="38" ry="18" fill="rgba(232,160,180,0.18)" transform="rotate(-30 90 60)"/>
            <ellipse cx="130" cy="40"  rx="28" ry="12" fill="rgba(196,181,232,0.2)"  transform="rotate(15 130 40)"/>
            <ellipse cx="60"  cy="100" rx="22" ry="10" fill="rgba(232,160,180,0.14)" transform="rotate(50 60 100)"/>
            <ellipse cx="710" cy="55"  rx="36" ry="16" fill="rgba(196,181,232,0.18)" transform="rotate(20 710 55)"/>
            <ellipse cx="740" cy="90"  rx="26" ry="11" fill="rgba(232,160,180,0.2)"  transform="rotate(-45 740 90)"/>
            <ellipse cx="680" cy="35"  rx="20" ry="9"  fill="rgba(196,181,232,0.14)" transform="rotate(60 680 35)"/>
            <ellipse cx="400" cy="20"  rx="16" ry="7"  fill="rgba(232,160,180,0.12)" transform="rotate(10 400 20)"/>
            <ellipse cx="350" cy="230" rx="30" ry="13" fill="rgba(196,181,232,0.12)" transform="rotate(-20 350 230)"/>
            <ellipse cx="450" cy="245" rx="24" ry="10" fill="rgba(232,160,180,0.1)"  transform="rotate(35 450 245)"/>
        </svg>

        <div class="header-inner">
            <div class="header-tag">Fragrance Discovery</div>
            <h1>Aroma<em>Atlas</em></h1>
            <p class="header-sub">Find your perfect scent ✿ Hash Map &amp; Trie Comparison</p>
        </div>
    </header>

    <main>
        <div class="search-card" id="searchPanel">
            <div class="section-label">Scent Notes</div>

            <div class="notes-row" id="notesRow">
                <div class="note-field" data-index="0">
                    <label>First note</label>
                    <input type="text" class="note-input" placeholder="e.g. rose" autocomplete="off" />
                    <ul class="autocomplete-list" style="display:none;"></ul>
                </div>
                <div class="note-field" data-index="1">
                    <label>Second note</label>
                    <input type="text" class="note-input" placeholder="e.g. vanilla" autocomplete="off" />
                    <ul class="autocomplete-list" style="display:none;"></ul>
                </div>
                <div class="note-field" data-index="2">
                    <label>Third note <span style="font-weight: 300; text-transform: none; letter-spacing: 0;">(optional)</span></label>
                    <input type="text" class="note-input" placeholder="e.g. sandalwood" autocomplete="off" />
                    <ul class="autocomplete-list" style="display:none;"></ul>
                </div>
            </div>

            <div class="priority-row">
                <div class="section-label">Priority Note</div>
                <div class="priority-options" id="priorityOptions">
                    <button class="priority-button selected" data-note="">None</button>
                </div>
            </div>

            <button class="search-button" id="searchButton" onclick="doSearch()">
                Search the Atlas
            </button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="performance-card" id="performanceBar">
            <div class="section-label">Query Performance</div>
            <div class="performance-grid">
                <div class="performance-item" id="hashPerformance">
                    <div class="ds-name">Hash Map</div>
                    <div class="ds-time"><span id="hashTime">-</span><span class="unit">ms</span></div>
                </div>
                <div class ="performance-item" id="triePerformance">
                    <div class="ds-name">Trie</div>
                    <div class="ds-time"><span id="trieTime">-</span><span class="unit">ms</span></div>
                </div>
            </div>
            <div class="performance-track">
                <div class="performance-fill" id="performanceBarFill" style="width:50%"></div>
            </div>
        </div>

        <div class="results-section" id="resultsSection" style="display:none;">
            <div class="ds-toggle">
                <button class="ds-toggle-button active" onclick="switchDS('hashmap')">Hash Map</button>
                <button class="ds-toggle-button" onclick="switchDS('trie')">Trie</button>
            </div>
            <div id="tierContainer"></div>
        </div>

    </main>

    <script>
        let lastResponse = null;
        let activeDS = 'hashmap';
        let acTimers = {};
        let acSelected = [-1, -1, -1];

        const tier_info = {
            tier1: {label: "Perfect Match"},
            tier2: {label: "Close Match"},
            tier3: {label: "Priority Match"},
        };

        const pageSize = 20;
        let tierPages = {tier1: 1, tier2: 1, tier3:1};

        function updatePriorityButtons() {
            const notes = getNotes().filter(Boolean);
            const options = document.getElementById('priorityOptions');
            const current = getSelectedPriority();
            options.innerHTML = '';
            options.appendChild(makeButton('None', '', current === ''));
            for (let i = 0; i < notes.length; i++) {
                const note = notes[i];
                if (note) {
                    const isSelected = current === note;
                    const button = makeButton(note, note, isSelected);
                    options.appendChild(button);
                }
            }
        }

        function makeButton(label, value, selected) {
            const button = document.createElement('button');

            if (selected) {
                button.className = 'priority-button selected';
            }
            else {
                button.className = 'priority-button';
            }
            button.dataset.note = value;

            if (label) {
                button.textContent = label;
            }
            else {
                button.textContent = 'None';
            }

            button.onclick = function () {
                const allButtons = document.querySelectorAll('.priority-button');
                for (let i = 0; i < allButtons.length; i++) {
                    allButtons[i].classList.remove('selected');
                }
                button.classList.add('selected');
            };
            return button;
        }

        function getSelectedPriority() {
            const selectedButton = document.querySelector('.priority-button.selected');
            if (selectedButton) {
                return selectedButton.dataset.note;
            }
            else {
                return '';
            }
        }

        function getNotes() {
            const inputs = document.querySelectorAll('.note-input');
            const notes = [];
            for (let i = 0; i < inputs.length; i++) {
                notes.push(inputs[i].value.trim().toLowerCase());
            }
            return notes;
        }

        const noteFields = document.querySelectorAll('.note-field');
        for (let i = 0; i < noteFields.length; i++) {
            const field = noteFields[i];
            const input = field.querySelector('input');
            const list = field.querySelector('.autocomplete-list');

            input.addEventListener('input', function() {
                clearTimeout(acTimers[i]);
                acTimers[i] = setTimeout(function() {
                    fetchAC(input, list, i);
                }, 150);
                updatePriorityButtons();
            });

            input.addEventListener('keydown', function(keyPress) {
                const items = list.querySelectorAll('li');

                if (keyPress.key === 'ArrowDown') {
                    acSelected[i] = Math.min(acSelected[i] + 1, items.length - 1);
                    highlight(items, acSelected[i]);
                    keyPress.preventDefault()
                }
                if (keyPress.key === 'ArrowUp') {
                    acSelected[i] = Math.max(acSelected[i] - 1, 0);
                    highlight(items, acSelected[i]);
                    keyPress.preventDefault()
                }
                if (keyPress.key === 'Enter') {
                    if (acSelected[i] >= 0 && items[acSelected[i]]) {
                        input.value = items[acSelected[i]].textContent;
                        closeList(list, i);
                        updatePriorityButtons();
                    }
                    else {
                        doSearch();
                    }
                }
                if (keyPress.key === 'Escape') {
                    closeList(list, i);
                }
            });
            document.addEventListener('click', function(keyPress) {
                if (!field.contains(keyPress.target)) {
                    closeList(list, i);
                }
            });
        }

        async function fetchAC(input, list, i) {
            const query = input.value.trim();
            if (query.length < 1) {
                closeList(list, i);
                return;
            }
            try {
                const response = await fetch('/autocomplete?q=' + encodeURIComponent(query));
                const data = await response.json()
                list.innerHTML = '';
                acSelected[i] = -1;

                if (!data.length) {
                    closeList(list, i);
                    return;
                }
                for (let j = 0; j < data.length; j++) {
                    const note = data[j];
                    const li = document.createElement('li');
                    li.textContent = note;
                    li.onmousedown = function(keyPress) {
                        keyPress.preventDefault();
                        input.value = note;
                        closeList(list, i);
                        updatePriorityButtons();
                    };
                    list.appendChild(li);
                }
                list.style.display = 'block';
            } catch(error) {
                // silent fail
            }
        }

        function highlight(items, index) {
            for (let i = 0; i < items.length; i++) {
                if (i === index) {
                    items[i].classList.add('active');
                } else {
                    items[i].classList.remove('active');
                }
            }
        }

        function closeList(list, i) {
            list.style.display = 'none';
            acSelected[i] = -1;
        }

        async function doSearch() {
            const allNotes = getNotes();
            const notes = [];
            for (let i = 0; i < allNotes.length; i++) {
                if (allNotes[i]) {
                    notes.push(allNotes[i]);
                }
            }
            const priority = getSelectedPriority();

            if (!notes.length) {
                showError('Please enter at least one scent note.')
                return;
            }

            showError('');
            setLoading(true);
            tierPages = {tier1: 1, tier2: 1, tier3:1};

            try {
                const result = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({notes: notes, priority: priority}),
                });
                const data = await result.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }
                lastResponse = data;
                activeDS = 'hashmap';

                showPerformance(data);
                showResults(data, activeDS);
                updateToggle();
            } catch(error) {
                showError('Make sure app.py is running.')
            } finally {
                setLoading(false);
            }
        }

        function showPerformance(data) {
            const hashTime = data.hashmap.time_ms;
            const trieTime = data.trie.time_ms;

            document.getElementById('hashTime').textContent = hashTime.toFixed(4);
            document.getElementById('trieTime').textContent = trieTime.toFixed(4);

            const fastest = data.fastest;

            if (fastest === 'hashmap') {
                document.getElementById('hashPerformance').classList.add('fastest');
                document.getElementById('triePerformance').classList.remove('fastest');
            } else {
                document.getElementById('triePerformance').classList.add('fastest');
                document.getElementById('hashPerformance').classList.remove('fastest');
            }
            const oldTags = document.querySelectorAll('.fastest-tag');
            for (let i = 0; i < oldTags.length; i++) {
                oldTags[i].remove();
            }
            let fastestElement;
            if (fastest === 'hashmap') {
                fastestElement = document.getElementById('hashPerformance');
            } else {
                fastestElement = document.getElementById('triePerformance');
            }
            const tag = document.createElement('div');
            tag.className = 'fastest-tag';
            tag.textContent = '▲ Faster';
            fastestElement.appendChild(tag);

            const total = hashTime + trieTime;
            let percentage;
            if (total > 0) {
                percentage = (hashTime / total) * 100;
            } else {
                percentage = 50;
            }
            document.getElementById('performanceBarFill').style.width = percentage + '%';
            document.getElementById('performanceBar').classList.add('visible');
        }

        function showResults(data, ds) {
            const results = data[ds].results;
            const container = document.getElementById('tierContainer');
            container.innerHTML = '';
            const priority = data.priority;

            const tiers = ['tier1', 'tier2', 'tier3'];

            for (let i = 0; i < tiers.length; i++) {
                const tier = tiers[i];
                const items = results[tier];
                const info = tier_info[tier];

                if ((tier === 'tier2' || tier === 'tier3')  && !priority) {
                    continue;
                }

                let tagLabel;
                if (tier === 'tier1') {
                    tagLabel = 'Tier 1';
                } else if (tier === 'tier2') {
                    tagLabel = 'Tier 2';
                } else {
                    tagLabel = 'Tier 3';
                }

                let countLabel;
                if (items.length === 1) {
                    countLabel = '1 result';
                } else {
                    countLabel = items.length + ' results';
                }

                const block = document.createElement('div');
                block.className = 'tier-block ' + tier;
                block.innerHTML =
                    '<div class="tier-header">' +
                        '<span class="tier-tag">' + tagLabel + '</span>' +
                        '<div class="tier-label">' + info.label + '</div>' +
                        '<div class="tier-count">' + countLabel + '</div>' +
                        '</div>' +
                        '<div class="perfume-list" id="' + tier + '-list"></div>';

                container.appendChild(block);

                const tierListContainer = block.querySelector('#' + tier + '-list');
                renderPage(tierListContainer, items, tier, priority);
            }
            document.getElementById('resultsSection').style.display = 'block';
        }

        function renderPage(tierListContainer, items, tier, priority) {
            const slice = items.slice(0, tierPages[tier] * pageSize);
            tierListContainer.innerHTML = '';

            if (!slice.length) {
                tierListContainer.innerHTML = '<div class ="empty-tier">No fragrances found for this tier</div>';
                return;
            }
            for (let i = 0; i < slice.length; i++) {
                const item = slice[i];
                const card = document.createElement('div');
                card.className = 'perfume-card';
                card.style.animationDelay = (Math.min(i, 10) * 0.03) + 's';

                let pills = '';
                for (let j = 0; j < item.matched_notes.length; j++) {
                    const mn = item.matched_notes[j];
                    let pillClass = 'note-pill ' + mn.layer;
                    if (mn.note === priority) {
                        pillClass = pillClass + ' priority';
                    }
                    pills = pills + '<span class="' + pillClass + '">' + mn.note + ' · ' + mn.layer + '</span>';
                }

                card.innerHTML =
                    '<div class="card-main">' +
                        '<div class="card-name">' + item.name + '</div>' +
                        '<div class="card-brand">' + item.brand + '</div>' +
                        '<div class="card-notes">' + pills + '</div>' +
                    '</div>' +
                    '<div class="card-num">' + (i + 1) + '</div>';

                tierListContainer.appendChild(card);
            }
            if (items.length > slice.length) {
                const remaining = items.length - slice.length;
                const button = document.createElement('button');
                button.className = 'show-more-button';
                button.textContent = 'Show more (' + remaining + ' remaining)';
                button.onclick = function () {
                    tierPages[tier]++;
                    tierListContainer.innerHTML = '';
                    renderPage(tierListContainer, items, tier, priority);
                };
                tierListContainer.appendChild(button);
            }
        }

        function switchDS(ds) {
            if (!lastResponse) {
                return;
            }
            activeDS = ds;
            tierPages = {tier1: 1, tier2: 1, tier3: 1};
            updateToggle();
            showResults(lastResponse, ds);
        }

        function updateToggle() {
            const toggleButtons = document.querySelectorAll('.ds-toggle-button');
            for (let i = 0; i < toggleButtons.length; i++) {
                if (i === 0 && activeDS === 'hashmap') {
                    toggleButtons[i].classList.add('active');
                } else if (i === 1 && activeDS === 'trie') {
                    toggleButtons[i].classList.add('active');
                } else {
                    toggleButtons[i].classList.remove('active');
                }
            }
        }

        function setLoading(on) {
            if (on) {
                document.getElementById('loadingOverlay').classList.add('visible');
                document.getElementById('searchButton').disabled = true;
            } else {
                document.getElementById('loadingOverlay').classList.remove('visible');
                document.getElementById('searchButton').disabled = false;
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorMessage');
            errorBox.textContent = message;
            if (message) {
                errorBox.classList.add('visible');
            } else {
                errorBox.classList.remove('visible');
            }
        }

    </script>

</body>
</html>
